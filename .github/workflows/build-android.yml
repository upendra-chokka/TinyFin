name: Build Android APK & AAB (Signed)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean

      - name: Force targetSdkVersion 35
        run: |
          echo "Keeping default targetSdkVersion from Expo (34)"

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/tinyfin-release.keystore

      - name: Build debug APK (unsigned)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Build debug AAB (unsigned)
        run: |
          cd android
          ./gradlew bundleDebug --no-daemon

      - name: Sign APK with jarsigner
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore android/app/tinyfin-release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            android/app/build/outputs/apk/debug/app-debug.apk \
            "${{ secrets.KEY_ALIAS }}"

      - name: Zipalign APK
        run: |
          ${ANDROID_HOME}/build-tools/34.0.0/zipalign -v 4 \
            android/app/build/outputs/apk/debug/app-debug.apk \
            android/app/build/outputs/apk/debug/app-release-signed.apk

      - name: Sign AAB with jarsigner
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore android/app/tinyfin-release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
            android/app/build/outputs/bundle/debug/app-debug.aab \
            "${{ secrets.KEY_ALIAS }}"
          cp android/app/build/outputs/bundle/debug/app-debug.aab \
            android/app/build/outputs/bundle/debug/app-release-signed.aab

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: tinyfin-kids-apk-signed
          path: android/app/build/outputs/apk/debug/app-release-signed.apk

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: tinyfin-kids-aab-signed
          path: android/app/build/outputs/bundle/debug/app-release-signed.aab
