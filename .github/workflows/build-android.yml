name: Build Android APK & AAB (Signed)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/tinyfin-release.keystore

      - name: Configure signing in build.gradle
        run: |
          cd android/app
          # Insert signing config before the buildTypes block
          sed -i '/buildTypes {/i \
          signingConfigs {\
              release {\
                  storeFile file("tinyfin-release.keystore")\
                  storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""\
                  keyAlias System.getenv("KEY_ALIAS") ?: ""\
                  keyPassword System.getenv("KEYSTORE_PASSWORD") ?: ""\
              }\
          }' build.gradle
          # Set release buildType to use release signing config
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' build.gradle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Build signed APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Build signed AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: tinyfin-kids-apk-signed
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: tinyfin-kids-aab-signed
          path: android/app/build/outputs/bundle/release/app-release.aab
