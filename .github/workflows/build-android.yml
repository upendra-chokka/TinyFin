name: Build Android APK & AAB (Signed)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean

      - name: Install Android API 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Configure Android toolchain
        run: |
          printf '\nandroid.kotlinVersion=1.9.25\nandroid.compileSdkVersion=35\nandroid.targetSdkVersion=35\nandroid.buildToolsVersion=35.0.0\n' >> android/gradle.properties
          echo "Effective Android Gradle properties:"
          grep -E '^android\.(kotlinVersion|compileSdkVersion|targetSdkVersion|buildToolsVersion)=' android/gradle.properties
          echo "Generated build.gradle property lookups:"
          grep -nE 'kotlinVersion|compileSdkVersion|targetSdkVersion|buildToolsVersion' android/build.gradle

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_BASE64" | base64 --decode > android/app/tinyfin-release.keystore

      - name: Build signed release APK and AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon \
            -Pandroid.kotlinVersion=1.9.25 \
            -Pandroid.compileSdkVersion=35 \
            -Pandroid.targetSdkVersion=35 \
            -Pandroid.buildToolsVersion=35.0.0 \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/tinyfin-release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEYSTORE_PASSWORD"

      - name: Verify release artifacts and signatures
        run: |
          test -s android/app/build/outputs/apk/release/app-release.apk
          test -s android/app/build/outputs/bundle/release/app-release.aab
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs \
            android/app/build/outputs/apk/release/app-release.apk
          # Do not use -strict: AABs can contain nested signed dependency entries
          # that trigger harmless JarInputStream warnings despite a valid outer signature.
          jarsigner -verify -verbose -certs \
            android/app/build/outputs/bundle/release/app-release.aab \
            | tee /tmp/tinyfin-aab-signature.txt
          grep -Fq "jar verified." /tmp/tinyfin-aab-signature.txt

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: tinyfin-kids-apk-signed
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload signed release AAB
        uses: actions/upload-artifact@v4
        with:
          name: tinyfin-kids-aab-signed
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
